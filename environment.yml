name: cellpose
channels:
  - conda-forge
dependencies:
  - python>=3.9,<3.12
  # Core dependencies (install_deps)
  - numpy>=1.20.0
  - scipy
  - natsort
  - tifffile
  - tqdm
  - pytorch>=1.6
  - torchvision
  - opencv
  - imagecodecs
  - fastremap
  - roifile
  - fill-voids
  # GUI dependencies (gui_deps)
  - pyqtgraph>=0.12.4
  - pyqt6
  - pyqt6-sip
  - qtpy
  - superqt
  # Image format support (image_deps)
  - nd2
  - pynrrd
  # Distributed computing (distributed_deps)
  - dask
  - distributed
  - dask-image
  - pyyaml
  - zarr
  - dask-jobqueue
  - bokeh
  - pyarrow
  - pip
  - pip:
    - segment_anything  # pip-only (core dependency)
    - -e .
